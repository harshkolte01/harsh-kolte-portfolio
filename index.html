<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Harsh Kolte | Full Stack Developer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Space Grotesk', 'sans-serif'],
            },
            colors: {
              navy: {
                900: '#0a192f',
                800: '#112240',
                700: '#233554',
              },
              accent: {
                cyan: '#64ffda',
                purple: '#bd34fe',
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #030014;
        color: #8892b0;
        overflow-x: hidden;
      }
      
      /* Ambient animated background */
      .ambient-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: -1;
        overflow: hidden;
        background: #030014;
      }
      .ambient-orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        opacity: 0.4;
        animation: float 20s infinite ease-in-out;
      }
      .orb-1 {
        width: 400px;
        height: 400px;
        background: radial-gradient(circle, rgba(100,255,218,0.2) 0%, rgba(3,0,20,0) 70%);
        top: -100px;
        left: -100px;
        animation-delay: 0s;
      }
      .orb-2 {
        width: 500px;
        height: 500px;
        background: radial-gradient(circle, rgba(189,52,254,0.15) 0%, rgba(3,0,20,0) 70%);
        bottom: -200px;
        right: -100px;
        animation-delay: -5s;
      }
      .orb-3 {
        width: 300px;
        height: 300px;
        background: radial-gradient(circle, rgba(100,255,218,0.15) 0%, rgba(3,0,20,0) 70%);
        top: 40%;
        left: 50%;
        transform: translate(-50%, -50%);
        animation-delay: -10s;
      }
      @keyframes float {
        0%, 100% { transform: translate(0, 0) scale(1); }
        33% { transform: translate(30px, -50px) scale(1.1); }
        66% { transform: translate(-20px, 20px) scale(0.9); }
      }

      /* Premium Glass Card */
      .glass-card {
        background: rgba(10, 10, 25, 0.4);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
      }
      .glass-card:hover {
        border-color: rgba(100, 255, 218, 0.2);
        box-shadow: 0 8px 32px 0 rgba(100, 255, 218, 0.05);
      }

      /* Base Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #030014;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        transition: background 0.3s;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(100, 255, 218, 0.5);
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",

}
</script>

</head>
